<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About — Adebare Adesokan</title>
    <meta name="description"
        content="About Adebare Adesokan — Computer Science undergraduate with experience in backend API engineering, full-stack development, and product operations.">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
</head>

<body>

    <header class="site-header">
        <div class="wrap">
            <div class="logo"><a href="index.html" data-wordmark>adebare.dev</a></div>
            <div class="nav-wrapper">
                <nav>
                    <a href="index.html">home</a>
                    <a href="#experience">experience</a>
                    <a href="#skills">skills</a>
                    <a href="#certifications">certifications</a>
                </nav>
                <a href="resume.pdf" class="nav-resume" download>resume →</a>
                <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
                    <svg class="moon-icon" viewBox="0 0 24 24">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                    <svg class="sun-icon" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <main class="wrap">

        <section class="hero" style="display:block; padding-bottom:0;">
            <p class="section-kicker">// about</p>
            <h1 class="hero-name" style="font-size:clamp(2.5rem,7vw,4rem)">About Me</h1>
            <div class="about-body" id="about-body" style="margin-top:20px"></div>
        </section>

        <section class="section" id="education">
            <p class="section-kicker">// education</p>
            <h2 class="section-title">Education</h2>
            <div class="timeline" id="education-mount"></div>
        </section>

        <section class="section" id="experience">
            <p class="section-kicker">// experience</p>
            <h2 class="section-title">Where I've Worked</h2>
            <div class="timeline" id="experience"></div>
        </section>

        <section class="section" id="skills">
            <p class="section-kicker">// technical skills</p>
            <h2 class="section-title">The Stack</h2>
            <div id="skills"></div>
        </section>

        <section class="section" id="certifications">
            <p class="section-kicker">// certifications</p>
            <h2 class="section-title">Certifications</h2>
            <div class="cert-list" id="certifications"></div>
        </section>

        <section class="section" id="achievements">
            <p class="section-kicker">// achievements</p>
            <h2 class="section-title">Honors & Awards</h2>
            <div id="achievements"></div>
        </section>

        <section class="section" id="community">
            <p class="section-kicker">// community</p>
            <h2 class="section-title">Community Service</h2>
            <div id="community"></div>
        </section>

    </main>

    <footer class="site-footer wrap" id="footer-mount"></footer>

    <script src="data.js"></script>
    <script src="render.js"></script>
    <script>
        RENDER.chrome();
        RENDER.about();
        RENDER.experience({ mount: "education-mount", only: "education", full: true });
        RENDER.experience({ mount: "experience", excludeEducation: true, full: true });
        RENDER.skills();
        RENDER.certifications();
        RENDER.bulletList("achievements", PORTFOLIO.achievements);
        RENDER.bulletList("community", PORTFOLIO.community);
    </script>
    <script src="main.js"></script>

</body>

</html>
